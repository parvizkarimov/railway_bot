<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Temir Yo'l Chiptalari</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --tg-bg: var(--tg-theme-bg-color, #ffffff);
    --tg-text: var(--tg-theme-text-color, #000000);
    --tg-hint: var(--tg-theme-hint-color, #999999);
    --tg-link: var(--tg-theme-link-color, #2EA6FF);
    --tg-btn: var(--tg-theme-button-color, #2EA6FF);
    --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
    --tg-secondary: var(--tg-theme-secondary-bg-color, #f0f0f0);
    --accent-blue: #2EA6FF;
    --accent-green: #34C759;
    --accent-gold: #FFD700;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
    font-family: 'Outfit', sans-serif; 
    background: var(--tg-bg); 
    color: var(--tg-text); 
    overflow-x: hidden;
    padding-bottom: 90px; /* Space for bottom nav */
}

.app { max-width: 480px; margin: 0 auto; padding: 16px; }

/* 3D Header Section */
.header-glass {
    background: linear-gradient(135deg, rgba(46, 166, 255, 0.1), rgba(46, 166, 255, 0.05));
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 24px;
    text-align: center;
    border: 1px solid rgba(46, 166, 255, 0.1);
    position: relative;
    overflow: hidden;
}
.header-glass::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    pointer-events: none;
}
.header-icon {
    font-size: 48px;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
    margin-bottom: 10px;
    display: inline-block;
}
.header-glass h1 { font-size: 22px; font-weight: 700; color: var(--tg-text); }
.header-glass p { font-size: 14px; opacity: 0.7; }

/* Navigation */
.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--tg-bg);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
    z-index: 1000;
    padding: 0 10px;
}
.nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.nav-icon {
    font-size: 24px;
    opacity: 0.5;
    transition: 0.3s;
    filter: grayscale(1);
}
.nav-label {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.5;
}
.nav-item.active .nav-icon {
    opacity: 1;
    transform: translateY(-4px) scale(1.1);
    filter: grayscale(0) drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
.nav-item.active .nav-label { opacity: 1; color: var(--tg-btn); }

/* Cards & Sections */
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.glass-card {
    background: var(--tg-secondary);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,0,0,0.02);
}

/* Form Styles */
.form-group { margin-bottom: 18px; }
.form-label { font-size: 11px; font-weight: 700; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
.input-wrapper { position: relative; }
.input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; }
.form-select, .form-input { 
    width: 100%; 
    padding: 14px 14px 14px 44px;
    border: none; 
    border-radius: 16px; 
    background: var(--tg-bg); 
    color: var(--tg-text); 
    font-size: 16px; 
    font-family: inherit; 
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    -webkit-appearance: none;
    appearance: none;
}

.swap-row { display: flex; justify-content: center; margin: -8px 0; position: relative; z-index: 10; }
.swap-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 4px solid var(--tg-secondary);
    background: var(--tg-btn);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(46, 166, 255, 0.3);
}

.btn-main {
    width: 100%;
    padding: 16px;
    background: var(--tg-btn);
    color: var(--tg-btn-text);
    border: none;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(46, 166, 255, 0.25);
    cursor: pointer;
}

/* Results */
.train-card {
    background: var(--tg-secondary);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.02);
}
.train-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
.train-brand { font-size: 16px; font-weight: 700; }
.train-num { font-size: 12px; background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 8px; opacity: 0.6; }

.time-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
.time-box { text-align: center; }
.time-val { font-size: 24px; font-weight: 700; }
.time-st { font-size: 11px; opacity: 0.5; font-weight: 600; }
.time-way { flex: 1; padding: 0 15px; text-align: center; position: relative; }
.way-dur { font-size: 11px; font-weight: 600; opacity: 0.4; margin-bottom: 4px; display: block; }
.way-line { height: 2px; background: rgba(0,0,0,0.08); position: relative; }
.way-line::after { content: '🚂'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 12px; }

.seat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
.seat-box {
    background: var(--tg-bg);
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.03);
}
.seat-name { font-size: 11px; font-weight: 700; opacity: 0.4; text-transform: uppercase; }
.seat-cnt { font-size: 15px; font-weight: 700; color: var(--accent-green); }
.seat-pr { font-size: 12px; font-weight: 600; opacity: 0.7; }

.btn-track {
    margin-top: 15px; width: 100%; padding: 12px;
    background: transparent; border: 2px solid var(--tg-btn);
    color: var(--tg-btn); border-radius: 14px;
    font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-track.added { background: var(--accent-green); color: #fff; border-color: var(--accent-green); }

/* Premium & Chips */
.premium-status-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%);
    padding: 12px 20px; border-radius: 18px; margin-bottom: 20px;
    color: #fff; font-weight: 700; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
}

.chip-group { margin-top: 12px; }
.chips { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.chip {
    padding: 8px 16px; border-radius: 12px; background: var(--tg-bg);
    font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
}
.chip.active { background: var(--tg-btn); color: #fff; border-color: var(--tg-btn); }
.chip.locked { opacity: 0.5; cursor: not-allowed; }

/* Subscriptions */
.sub-card {
    background: var(--tg-secondary); border-radius: 20px; padding: 18px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
}
.sub-info h3 { font-size: 16px; font-weight: 700; }
.sub-meta { font-size: 12px; opacity: 0.5; margin-top: 4px; display: flex; gap: 10px; }
.sub-int { background: var(--tg-btn); color: #fff; padding: 2px 8px; border-radius: 6px; font-weight: 700; cursor: pointer; }
.sub-del { font-size: 24px; color: #ff3b30; opacity: 0.4; cursor: pointer; padding: 10px; }

/* Modal */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: flex-end; }
.modal-c { background: var(--tg-bg); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px; animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; }
.plan-btn {
    display: flex; justify-content: space-between; align-items: center; padding: 20px;
    background: var(--tg-secondary); border-radius: 20px; margin-bottom: 10px; border: none;
    width: 100%; font-size: 16px; font-weight: 700; color: var(--tg-text); cursor: pointer;
}
.plan-price { color: #d4a017; }

/* Loading */
.loading { text-align: center; padding: 40px 0; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.05); border-top-color: var(--tg-btn); border-radius: 50%; animation: rot 1s linear infinite; margin: 0 auto 15px; }
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header-glass">
        <span class="header-icon">🚄</span>
        <h1>Railway Bot</h1>
        <p>Tezkor chipta kuzatuv tizimi</p>
    </div>

    <!-- Home/Search Section -->
    <div id="search-section" class="section active">
        <div class="glass-card">
            <div class="form-group">
                <label class="form-label">Qayerdan</label>
                <div class="input-wrapper">
                    <span class="input-icon">📍</span>
                    <select id="from" class="form-select"></select>
                </div>
            </div>
            
            <div class="swap-row">
                <button class="swap-btn" onclick="swap()">⇅</button>
            </div>

            <div class="form-group">
                <label class="form-label">Qayerga</label>
                <div class="input-wrapper">
                    <span class="input-icon">🏁</span>
                    <select id="to" class="form-select"></select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ketish sanasi</label>
                <div class="input-wrapper">
                    <span class="input-icon">📅</span>
                    <input type="date" id="date" class="form-input">
                </div>
            </div>

            <button class="btn-main" onclick="search()">🔍 Qidirish</button>
        </div>
        <div id="results"></div>
    </div>

    <!-- Subscriptions Section -->
    <div id="subs-section" class="section">
        <div id="wlist"></div>
    </div>

    <!-- Stars/Premium Section -->
    <div id="stars-section" class="section">
        <div class="premium-status-bar" id="p-status">
            <span>Holat: Oddiy</span>
            <span>⭐ 0</span>
        </div>
        
        <div class="glass-card" style="text-align: center;">
            <span style="font-size: 50px;">💎</span>
            <h2 style="margin: 10px 0;">Premium Afzalliklari</h2>
            <p style="opacity: 0.6; font-size: 14px; margin-bottom: 20px;">
                • Tezkor kuzatuv (15s, 30s)<br>
                • Cheksiz kuzatuvlar soni<br>
                • Birinchilardan bo'lib xabar olish
            </p>
            <button class="btn-main" onclick="openPremiumModal()">Sotib olish</button>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="navTo('search-section', this)">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Qidiruv</span>
    </div>
    <div class="nav-item" onclick="navTo('subs-section', this)">
        <span class="nav-icon">🔔</span>
        <span class="nav-label">Kuzatuv</span>
    </div>
    <div class="nav-item" onclick="navTo('stars-section', this)">
        <span class="nav-icon">⭐</span>
        <span class="nav-label">Stars</span>
    </div>
</div>

<!-- Premium Modal -->
<div id="premiumModal" class="modal" onclick="closeModal(event)">
    <div class="modal-c" onclick="event.stopPropagation()">
        <div class="modal-title">Premium Tanlang</div>
        <div class="plan-btn" onclick="buyPremium(1)">
            <span>1 kunlik</span> <span class="plan-price">1 ⭐</span>
        </div>
        <div class="plan-btn" onclick="buyPremium(5)">
            <span>5 kunlik</span> <span class="plan-price">5 ⭐</span>
        </div>
        <div class="plan-btn" onclick="buyPremium(10)">
            <span>10 kunlik</span> <span class="plan-price">10 ⭐</span>
        </div>
        <button class="btn-main" style="background: var(--tg-secondary); color: var(--tg-text); margin-top: 10px;" onclick="closeModal(null)">Yopish</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
const STATIONS = {"Toshkent":"2900000","Samarqand":"2900700","Buxoro":"2900800","Namangan":"2900940","Andijon":"2900680","Qoqon":"2900880","Qarshi":"2900750","Termiz":"2900255","Xiva":"2900172","Urgench":"2900790","Jizzax":"2900720","Nukus":"2900970"};
let isPremium = false;

function init() {
    tg.expand(); // Full screen
    tg.ready();
    
    const f = document.getElementById('from'), t = document.getElementById('to');
    Object.keys(STATIONS).forEach(n => {
        f.innerHTML += `<option value="${STATIONS[n]}" ${n==='Toshkent'?'selected':''}>${n}</option>`;
        t.innerHTML += `<option value="${STATIONS[n]}" ${n==='Samarqand'?'selected':''}>${n}</option>`;
    });
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    loadSubs();
}

function navTo(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    if (id === 'subs-section') loadSubs();
}

function swap() {
    const f = document.getElementById('from'), t = document.getElementById('to');
    [f.value, t.value] = [t.value, f.value];
}

async function search() {
    const f = document.getElementById('from').value, t = document.getElementById('to').value;
    if (f === t) { tg.showAlert("Qayerdan va Qayerga bir xil bo'lishi mumkin!"); return; }
    const res = document.getElementById('results');
    res.innerHTML = '<div class="loading"><div class="spinner"></div>Qidirilmoqda...</div>';
    
    try {
        const r = await fetch('/api/trains', { method: 'POST', body: JSON.stringify({from: f, to: t, date: document.getElementById('date').value}) });
        const d = await r.json();
        renderTrains(d.trains || []);
    } catch(e) {
        res.innerHTML = '<div class="loading">Xatolik yuz berdi.</div>';
    }
}

function renderTrains(trains) {
    const res = document.getElementById('results');
    if (!trains.length) { res.innerHTML = '<div class="loading">Poyezd topilmadi.</div>'; return; }
    
    res.innerHTML = trains.map(t => {
        const seatHtml = (t.cars || []).map(c => `
            <div class="seat-box">
                <div class="seat-name">${c.type}</div>
                <div class="seat-cnt">${c.freeSeats} joy</div>
                <div class="seat-pr">${(c.price||0).toLocaleString()} so'm</div>
            </div>
        `).join('');
        
        return `
        <div class="train-card">
            <div class="train-header">
                <div><div class="train-brand">${t.brand}</div><div class="train-num">№ ${t.number}</div></div>
                <span style="font-size: 20px;">🚆</span>
            </div>
            <div class="time-row">
                <div class="time-box"><div class="time-val">${t.departureDate.split(' ')[1]}</div><div class="time-st">Dep</div></div>
                <div class="time-way"><span class="way-dur">${t.timeOnWay}</span><div class="way-line"></div></div>
                <div class="time-box"><div class="time-val">${t.arrivalDate.split(' ')[1]}</div><div class="time-st">Arr</div></div>
            </div>
            <div class="seat-grid">${seatHtml || '<div style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 10px;">Chiptalar qolmagan</div>'}</div>
            
            <div class="chip-group">
                <span class="form-label">Interval</span>
                <div class="chips" id="int-${t.number}">
                    <span class="chip ${!isPremium?'locked':''}" onclick="setChip(this,15)">15s</span>
                    <span class="chip ${!isPremium?'locked':''}" onclick="setChip(this,30)">30s</span>
                    <span class="chip active" onclick="setChip(this,60)">60s</span>
                </div>
            </div>
            
            <button class="btn-track" id="btn-${t.number}" onclick="addWatch('${t.number}')">🔔 Kuzatuvni yoqish</button>
        </div>`;
    }).join('');
}

function setChip(el, sec) {
    if (!isPremium && sec < 60) { navTo('stars-section', document.querySelectorAll('.nav-item')[2]); return; }
    el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

async function addWatch(num) {
    const btn = document.getElementById(`btn-${num}`);
    const iText = document.querySelector(`#int-${num} .active`).innerText.replace('s','').replace('🔒','').trim();
    const r = await fetch('/api/subs', { method: 'POST', body: JSON.stringify({
        user_id: tg.initDataUnsafe?.user?.id || 0,
        from: document.getElementById('from').value, to: document.getElementById('to').value,
        date: document.getElementById('date').value, interval: parseInt(iText),
        prefs: ["lower", "upper", "sitting"]
    }) });
    const res = await r.json();
    if (res.ok) { 
        btn.innerText = "✅ Qo'shildi";
        btn.classList.add('added');
    } else { tg.showAlert(res.error); }
}

async function loadSubs() {
    const uid = tg.initDataUnsafe?.user?.id || 0;
    const r = await fetch(`/api/subs?user_id=${uid}`);
    const d = await r.json();
    isPremium = d.is_premium;
    
    const ps = document.getElementById('p-status');
    if (isPremium) {
        ps.innerHTML = `<span>Premium: Faol</span> <span>📅 ${d.premium_until}</span>`;
        ps.style.background = 'linear-gradient(90deg, #34C759 0%, #2EA6FF 100%)';
    } else {
        ps.innerHTML = `<span>Holat: Oddiy</span> <span>⭐ 0</span>`;
        ps.style.background = 'linear-gradient(90deg, #FFD700 0%, #FFA500 100%)';
    }

    const w = document.getElementById('wlist');
    if (!d.subs || !d.subs.length) {
        w.innerHTML = '<div class="loading">Kuzatuvlar yo\'q.</div>';
    } else {
        w.innerHTML = d.subs.map(s => `
        <div class="sub-card">
            <div class="sub-info">
                <h3>${s.from_st} → ${s.to_st}</h3>
                <div class="sub-meta">
                    <span>${s.date}</span>
                    <span class="sub-int" onclick="cycleInterval(${s.id}, ${s.interval})">${s.interval}s ✏️</span>
                </div>
            </div>
            <div class="sub-del" onclick="delSub(${s.id})">×</div>
        </div>`).join('');
    }
}

async function cycleInterval(id, curr) {
    const opts = [60, 15, 30];
    const next = opts[(opts.indexOf(curr) + 1) % opts.length];
    if (next < 60 && !isPremium) { navTo('stars-section', document.querySelectorAll('.nav-item')[2]); return; }
    await fetch('/api/subs/update', { method: 'POST', body: JSON.stringify({id, interval: next}) });
    loadSubs();
}

async function delSub(id) {
    await fetch('/api/subs/delete', { method: 'POST', body: JSON.stringify({id}) });
    loadSubs();
}

function openPremiumModal() { document.getElementById('premiumModal').style.display = 'flex'; }
function closeModal(e) { if (!e || e.target.id === 'premiumModal') document.getElementById('premiumModal').style.display = 'none'; }

async function buyPremium(days) {
    const r = await fetch('/api/create_invoice', { method: 'POST', body: JSON.stringify({user_id: tg.initDataUnsafe?.user?.id, days}) });
    const d = await r.json();
    if (d.ok && d.link) {
        tg.openInvoice(d.link, (status) => {
            if (status === 'paid') {
                closeModal(null);
                loadSubs();
                tg.showAlert("Tabriklaymiz! Premium faollashdi.");
            }
        });
    }
}

init();
</script>
</body>
</html>
