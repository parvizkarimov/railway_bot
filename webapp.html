<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Railway Kuzatuvchi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root { --accent: #2EA6FF; --bg: var(--tg-theme-bg-color, #fff); --sec-bg: var(--tg-theme-secondary-bg-color, #f5f5f5); --text: var(--tg-theme-text-color, #000); --hint: var(--tg-theme-hint-color, #888); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 20px; }
.app { max-width: 480px; margin: 0 auto; padding: 12px 16px; }
.header { text-align: center; padding: 10px 0 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; background: var(--sec-bg); border-radius: 12px; padding: 4px; }
.tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--hint); cursor: pointer; }
.tab.active { background: var(--bg); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.section { display: none; }
.section.active { display: block; }

.card { background: var(--sec-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.form-group { margin-bottom: 12px; }
.label { font-size: 12px; font-weight: 600; opacity: 0.6; margin-bottom: 6px; display: block; text-transform: uppercase; }
select, input { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 15px; }
.btn-main { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 8px; }

/* Settings Modal */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
.modal-content { background: var(--bg); width: 100%; border-radius: 20px 20px 0 0; padding: 20px; animation: slideUp 0.3s; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; }

.checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
.check-tag { padding: 8px 14px; border-radius: 10px; background: var(--sec-bg); font-size: 14px; cursor: pointer; border: 1.5px solid transparent; }
.check-tag.active { border-color: var(--accent); background: rgba(46, 166, 255, 0.1); color: var(--accent); }

.train-card { background: var(--sec-bg); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.train-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
.train-name { font-weight: 700; font-size: 16px; }
.train-times { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
.time { font-size: 20px; font-weight: 700; }
.line { flex: 1; height: 1px; background: var(--hint); margin: 0 15px; opacity: 0.3; }

.seat-row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 4px; opacity: 0.8; }
.btn-watch { width: 100%; padding: 10px; background: transparent; border: 1.5px solid var(--accent); color: var(--accent); border-radius: 12px; font-weight: 600; margin-top: 12px; }

.watch-item { background: var(--sec-bg); border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.watch-text { font-size: 15px; font-weight: 600; }
.watch-sub { font-size: 12px; opacity: 0.6; margin-top: 4px; }
.btn-del { background: none; border: none; color: #ff4d4d; font-size: 20px; padding: 5px; }

.loading { text-align: center; padding: 40px; opacity: 0.5; }
</style>
</head>
<body>
<div class="app">
    <div class="header"><h3>🚂 Railway Bilet</h3></div>
    <div class="tabs">
        <button class="tab active" onclick="showTab('search')">Qidirish</button>
        <button class="tab" onclick="showTab('subs')">Kuzatuvlar <span id="cnt"></span></button>
    </div>

    <div id="search" class="section active">
        <div class="card">
            <div class="form-group"><label class="label">Qayerdan</label><select id="from"></select></div>
            <div class="form-group"><label class="label">Qayerga</label><select id="to"></select></div>
            <div class="form-group"><label class="label">Sana</label><input type="date" id="date"></div>
            <button class="btn-main" onclick="onSearch()">Qidirish</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="subs" class="section">
        <div id="sub-list"></div>
    </div>
</div>

<!-- Settings Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Kuzatuv sozlamalari</div>
        
        <label class="label">Tekshirish intervali</label>
        <div class="checks" id="intervals">
            <div class="check-tag" data-val="10">10 sek</div>
            <div class="check-tag active" data-val="60">1 daqiqa</div>
            <div class="check-tag" data-val="300">5 daqiqa</div>
        </div>

        <label class="label">O'rin turi</label>
        <div class="checks" id="seatTypes">
            <div class="check-tag active" data-val="lower">Pastki</div>
            <div class="check-tag active" data-val="upper">Tepadagi</div>
            <div class="check-tag active" data-val="sitting">O'tiradigan</div>
        </div>

        <label class="label">Maksimal narx (0 - cheksiz)</label>
        <div class="form-group"><input type="number" id="maxPrice" value="0" placeholder="Masalan: 200000"></div>

        <button class="btn-main" id="btnConfirm">Kuzatishni boshlash</button>
        <button class="btn-watch" style="border:none; color:var(--hint)" onclick="closeModal()">Bekor qilish</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const STATIONS = {"Toshkent":"2900000","Samarqand":"2900700","Buxoro":"2900800","Namangan":"2900940","Andijon":"2900680","Qoqon":"2900880","Qarshi":"2900750","Termiz":"2900255","Xiva":"2900172","Urgench":"2900790","Jizzax":"2900720","Nukus":"2900970"};
const stName = (c) => Object.keys(STATIONS).find(k => STATIONS[k] === c) || c;

let currentWatchData = null;
let subscriptions = [];

function init() {
    const f = document.getElementById('from');
    const t = document.getElementById('to');
    Object.keys(STATIONS).forEach(s => {
        f.innerHTML += `<option value="${STATIONS[s]}">${s}</option>`;
        t.innerHTML += `<option value="${STATIONS[s]}">${s}</option>`;
    });
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    
    // Tag selection
    document.querySelectorAll('.checks').forEach(group => {
        group.addEventListener('click', (e) => {
            if (e.target.classList.contains('check-tag')) {
                if (group.id === 'intervals') {
                    group.querySelectorAll('.check-tag').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                } else {
                    e.target.classList.toggle('active');
                }
            }
        });
    });
    loadSubs();
}

function showTab(t) {
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(t)));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === t));
}

async function onSearch() {
    const res = document.getElementById('results');
    res.innerHTML = '<div class="loading">Qidirilmoqda...</div>';
    try {
        const r = await fetch('/api/trains', {
            method: 'POST',
            body: JSON.stringify({from: document.getElementById('from').value, to: document.getElementById('to').value, date: document.getElementById('date').value})
        });
        const d = await r.json();
        renderTrains(d.trains || []);
    } catch(e) { res.innerHTML = 'Xatolik yuz berdi.'; }
}

function renderTrains(trains) {
    const res = document.getElementById('results');
    if (!trains.length) { res.innerHTML = '<div class="loading">Poyezd topilmadi.</div>'; return; }
    res.innerHTML = trains.map(t => {
        const seats = (t.cars || []).map(c => `<div class="seat-row"><span>${c.type}</span><b>${c.freeSeats} joy</b></div>`).join('');
        return `
        <div class="train-card">
            <div class="train-info"><span class="train-name">${t.brand || 'Poyezd'}</span><span>#${t.number}</span></div>
            <div class="train-times">
                <span class="time">${t.departureDate.split(' ')[1]}</span>
                <div class="line"></div>
                <span class="time">${t.arrivalDate.split(' ')[1]}</span>
            </div>
            <div>${seats}</div>
            <button class="btn-watch" onclick="openModal('${t.brand}')">Kuzatishga qo'shish</button>
        </div>`;
    }).join('');
}

function openModal(brand) {
    currentWatchData = {
        from: document.getElementById('from').value,
        to: document.getElementById('to').value,
        date: document.getElementById('date').value,
        user_id: tg.initDataUnsafe?.user?.id || 0
    };
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('btnConfirm').onclick = async () => {
    const interval = document.querySelector('#intervals .active').dataset.val;
    const prefs = Array.from(document.querySelectorAll('#seatTypes .active')).map(t => t.dataset.val);
    const max_price = document.getElementById('maxPrice').value;
    
    const payload = {...currentWatchData, interval, prefs, max_price};
    
    tg.MainButton.showProgress();
    try {
        const r = await fetch('/api/subs', { method: 'POST', body: JSON.stringify(payload) });
        if (await r.json()) {
            tg.showAlert("Kuzatuv yoqildi! Joy topilsa bot xabar beradi.");
            closeModal();
            loadSubs();
        }
    } catch(e) { tg.showAlert("Xato yuz berdi."); }
    tg.MainButton.hideProgress();
};

async function loadSubs() {
    const uid = tg.initDataUnsafe?.user?.id || 0;
    const r = await fetch(`/api/subs?user_id=${uid}`);
    const d = await r.json();
    subscriptions = d.subs || [];
    renderSubs();
}

function renderSubs() {
    const list = document.getElementById('sub-list');
    document.getElementById('cnt').innerText = subscriptions.length ? `(${subscriptions.length})` : '';
    if (!subscriptions.length) { list.innerHTML = '<div class="loading">Hozircha kuzatuvlar yo\'q.</div>'; return; }
    list.innerHTML = subscriptions.map(s => `
        <div class="watch-item">
            <div>
                <div class="watch-text">${s.from_st} → ${s.to_st}</div>
                <div class="watch-sub">${s.date} | ${s.interval} sek | ${s.prefs.join(', ')}</div>
            </div>
            <button class="btn-del" onclick="delSub(${s.id})">×</button>
        </div>
    `).join('');
}

async function delSub(id) {
    if (!confirm("O'chirishni tasdiqlaysizmi?")) return;
    await fetch('/api/subs/delete', { method: 'POST', body: JSON.stringify({id}) });
    loadSubs();
}

init();
</script>
</body>
</html>
